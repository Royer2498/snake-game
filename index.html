<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Snake</title>
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <div class="container">
        <h1>Snake</h1>
        <div class="difficulty">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy (15×15 · slow)</option>
                <option value="medium" selected>Medium (20×20)</option>
                <option value="hard">Hard (25×25 · fast)</option>
            </select>
        </div>
        <canvas id="game" width="400" height="400"></canvas>
        <div class="info">
            <span id="score">Score: 0</span>
            <button id="restart">Restart</button>
        </div>
        <p class="hint">Arrows / WASD to move</p>
    </div>
    <script src="index.js"></script>
</body>
</html>
